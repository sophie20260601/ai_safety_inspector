name: AI Safety Inspector CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:          # 手动触发完整安全审计
    inputs:
      run_full_audit:
        description: 'Run full safety audit (requires DEEPSEEK_API_KEY)'
        type: boolean
        default: false

jobs:
  # ── 自动触发：结构验证（无需 API Key）──
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run structure tests
        run: python -m pytest tests/ -v

  # ── 手动触发：完整安全审计（需配置 DEEPSEEK_API_KEY Secret）──
  safety-audit:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_full_audit }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full safety audit
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python run.py

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: reports/
